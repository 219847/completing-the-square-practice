<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body style="font-family:'Ubuntu'; background-color:blue;">
<script>
var correctAnswer=0;
var a=0;
var b=0;
var c=0;
function newQuestion() {
var a=Math.floor(Math.random() * 10)+1;
var b=Math.floor(Math.random() * 100)+1;
var c=Math.floor(Math.random() * 2100)+1;
document.getElementById("question").innerHTML=`Ethan has the equation y=${a}x<sup>2</sup>+${b}x+${c}. Help her find the x coordinate of the vertex.`;
correctAnswer=Number((-b/(2*a)).toFixed(2));
}

function checkAnswer() {
var givenAnswer=Number(document.getElementById("answerSpot").value);
if (givenAnswer==correctAnswer) {
document.getElementById("status").innerText="Correct!";
newQuestion();
document.getElementById("answerSpot").value="";
for (i=10; i<=100; i+=10) {
var score=Number(document.getElementById("masteryScore").innerText);
if (score<i) {
score+=11-(i/10);
document.getElementById("masteryScore").innerText=score; 
break;}
}
}
else {
document.getElementById("status").innerText=`Incorrect! Ethan has gooned! The correct answer was ${correctAnswer}!`;
newQuestion();
document.getElementById("answerSpot").value="";
for (i=10; i<=100; i+=10) {
var score=Number(document.getElementById("masteryScore").innerText);
if (score<i) {
score-=((i/10));
if (score<0) {
score=0;}
document.getElementById("masteryScore").innerText=score; 
break;}
}
}
}
</script>
<h1 style="color:#2bffa3;">Completing the Square practice</h1>
<h3 style="color:#2bffa3;">Enter your answer as a whole number or a decimal rounded to 2 decimal places.</h3>
<p id="question" style="color:#2bffa3; font-weight:bold;">Ethan has the equation y=x<sup>2</sup>+4x+3. Help her find the x coordinate of the vertex.</p>
<script>
newQuestion();
</script>
<input id="answerSpot">
<button id="submit" onclick="checkAnswer()" style=" background-color:rgb(0,180,255); font-family:'Ubuntu';">Make Ethan Proud</button>
<p id="status"></p>
<br>
<p style="color:#2bffa3; font-weight:bold;">Mastery Score:</p>
<h1 id="masteryScore" style="color:#2bffa3;">0</h1>
</body>
</html>
